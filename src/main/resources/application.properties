spring.application.name=courseapp
server.port=9989
spring.config.import=optional:file:.env[.properties]

#main db
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DRIVER_CLASS_NAME}


#mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#jwt
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#minio

# C:\Program Files\Minio
# minio.exe server C:\minio-data --console-address ":9001"
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ROOT_USER}
minio.secret-key=${MINIO_ROOT_PASSWORD}
minio.video-bucket=${MINIO_VIDEO_BUCKET:course-videos}
minio.avatar-bucket=${MINIO_AVATAR_BUCKET:user-avatars}
minio.document-bucket=${MINIO_DOCUMENT_BUCKET:certificates}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-part-count=-1

# claude api
groq.api-key=${GROQ_API_KEY}
